services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3040:8000"
    env_file:
      - .env.local
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 16g

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3040
    ports:
      - "3030:3000"
    restart: unless-stopped
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 16g
